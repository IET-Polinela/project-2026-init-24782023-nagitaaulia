<h1>Selamat Datang di velmoracity</h1>

<p>Website untuk pelaporan masalah.</p>

<h2>Daftar Laporan</h2>

<a href="{% url 'report_add' %}">Tambah Laporan</a>

<hr>

{% for report in reports %}
<div style="border:1px solid black; padding:10px; margin:10px;">

    <p><b>Judul:</b> {{ report.title }}</p>
    <p><b>Lokasi:</b> {{ report.location }}</p>
    <p><b>Status:</b> {{ report.status }}</p>

    <a href="{% url 'report_edit' report.id %}">Edit</a> |
    <a href="{% url 'report_delete' report.id %}">Hapus</a>
    <a href="{% url 'report_detail' report.id %}">Detail</a>

    <form method="POST" action="{% url 'report_status' report.id %}">
        {% csrf_token %}
        <select name="status">
            <option value="REPORTED">Reported</option>
            <option value="VERIFIED">Verified</option>
            <option value="IN_PROGRESS">In Progress</option>
            <option value="RESOLVED">Resolved</option>
        </select>
        <button type="submit">Ubah Status</button>
    </form>

</div>
{% endfor %}
