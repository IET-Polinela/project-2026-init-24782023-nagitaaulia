<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Velmora City Portal - Nagita Aulia</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #fdf2f8, #f3e8ff, #e0f2fe);
    }

    .card {
      border-radius: 18px;
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(10px);
    }

    .spa-container {
      min-height: calc(100vh - 80px);
    }

    .progress {
      height: 22px;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark shadow-sm"
       style="background: linear-gradient(90deg,#ec4899,#a855f7);">

    <div class="container-fluid px-4">

      <a class="navbar-brand fw-bold" href="#dashboard">
        <i class="bi bi-buildings-fill me-2"></i>
        Velmora City Portal - Nagita Aulia
      </a>

      <div id="nav-menu" class="ms-auto"></div>

    </div>

  </nav>

  <!-- MAIN CONTENT SPA -->
  <main
    id="app-content"
    class="container-fluid px-4 mt-4 spa-container">
  </main>

  <!-- MODAL REPORT -->
  <div
    class="modal fade"
    id="reportModal"
    tabindex="-1">

    <div class="modal-dialog modal-lg">

      <div class="modal-content">

        <div class="modal-header">

          <h5 class="modal-title">
            Form Laporan Warga
          </h5>

          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal">
          </button>

        </div>

        <div class="modal-body">

          <form id="reportForm">

            <div class="mb-3">
              <label class="form-label">
                Judul Laporan
              </label>

              <input
                type="text"
                id="title"
                class="form-control"
                required>
            </div>

            <div class="mb-3">
              <label class="form-label">
                Kategori
              </label>

              <input
                type="text"
                id="category"
                class="form-control"
                required>
            </div>

            <div class="mb-3">
              <label class="form-label">
                Lokasi
              </label>

              <input
                type="text"
                id="location"
                class="form-control"
                required>
            </div>

            <div class="mb-3">
              <label class="form-label">
                Deskripsi
              </label>

              <textarea
                id="description"
                rows="5"
                class="form-control"
                required></textarea>
            </div>

          </form>

        </div>

        <div class="modal-footer">

          <button
            type="button"
            class="btn btn-secondary"
            onclick="submitReport('DRAFT')">

            Simpan Draft

          </button>

          <button
            type="button"
            class="btn btn-primary"
            onclick="submitReport('REPORTED')">

            Ajukan

          </button>

        </div>

      </div>

    </div>

  </div>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/router.js"></script>

</body>
</html>
