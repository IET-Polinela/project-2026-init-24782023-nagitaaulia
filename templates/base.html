<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}IET City{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            background: linear-gradient(135deg, #ff6ec4, #7873f5);
            min-height: 100vh;
        }

        /* BACKGROUND PINK GALAXY */
        body {
            background: linear-gradient(135deg, #ff6ec4, #7873f5);
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-size: cover;
        }

        /* hilangkan putih bootstrap */
        .container {
            background: transparent !important;
        }

        /* biar tabel tetap jelas */
        /* TABEL GLASS / GALAXY */

        /* PAKSA TABEL JADI GALAXY */
        table,
        .table,
        .table tbody,
        .table tr,
        .table td,
        .table th {
            background: transparent !important;
            color: white !important;
        }

        /* HEADER */
        .table thead th {
            background: linear-gradient(90deg, #ff6ec4, #7873f5) !important;
            color: white !important;
        }

        /* BARIS */
        .table tbody tr {
            background: rgba(255, 255, 255, 0.1) !important;
        }

        /* HOVER */
        .table tbody tr:hover {
            background: rgba(255, 255, 255, 0.2) !important;
            transition: 0.3s;
        }

        /* BORDER HILANG */
        .table td, .table th {
            border: none !important;
        }

        /* EFFECT GLASS */
        .table {
            backdrop-filter: blur(10px);
            border-radius: 15px;
            overflow: hidden;
        }

        .table-responsive {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .btn:hover {
            opacity: 0.85;
            transform: scale(1.05);
            transition: 0.2s;
        }

        .btn-galaxy {
            background: linear-gradient(45deg, #ff6ec4, #7873f5);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-galaxy:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #ff6ec4;
        }

        /* tombol transparan elegan */
        .btn-glass {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-glass:hover {
            background: rgba(255,255,255,0.35);
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .btn-danger-galaxy {
            background: linear-gradient(45deg, #ff4d6d, #ff6ec4);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-danger-galaxy:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #ff4d6d;
        }

        .bg-purple {
            background: linear-gradient(45deg, #9b59b6, #6a11cb);
            color: white;
        }

        /* OVERLAY */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* SPINNER */
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(255,255,255,0.3);
            border-top: 6px solid #ff6ec4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* ANIMASI */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        
    </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<div id="loading-overlay" style="display:none;">
    <div class="spinner"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const forms = document.querySelectorAll("form");

    forms.forEach(form => {
        form.addEventListener("submit", function () {
            document.getElementById("loading-overlay").style.display = "flex";
        });
    });

});
</script>

<body>


<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark"
     style="background: linear-gradient(90deg, #ff6ec4, #7873f5);">

    <div class="container">
        <a class="navbar-brand" href="/">Velmoracity</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link text-white" href="/">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white" href="/reports/">Reports</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white" href="/about/">About</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white" href="/contacts/">Contacts</a>
                </li>

                {% if user.is_authenticated %}
                <li class="nav-item">
                    <form action="/accounts/logout/" method="post" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit"
                                class="nav-link text-white"
                                style="background:none; border:none;">
                            Logout
                        </button>
                    </form>
                </li>
                {% else %}
                <li class="nav-item">
                    <a class="nav-link text-white" href="/accounts/login/">Login</a>
                </li>
                {% endif %}

            </ul>
        </div>
    </div>
</nav>

<!-- ALERT -->
<div class="container mt-4">
{% if messages %}
    {% for message in messages %}
        <div class="alert alert-success">{{ message }}</div>
    {% endfor %}
{% endif %}
</div>

<!-- CONTENT -->
<div class="container mt-5">
    {% block content %}
    {% endblock %}
</div>
</body>
</html>
