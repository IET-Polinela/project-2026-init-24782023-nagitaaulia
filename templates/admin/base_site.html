{% extends "admin/base.html" %}
{% load static %}

{% block title %}Velmoracity Admin{% endblock %}

{% block branding %}
<h1 style="color:white;">Velmoracity Admin</h1>
{% endblock %}

{% block extrastyle %}
<style>

/* Background utama */
body {
    background: linear-gradient(90deg, #ff6ec4, #7873f5) !important;
}

/* Header atas */
#header {
    background: linear-gradient(90deg, #ff6ec4, #7873f5) !important;
    color: white;
}

/* Card / container */
.module, .dashboard-module, .grp-module {
    background: rgba(255,255,255,0.1) !important;
    backdrop-filter: blur(10px);
    border-radius: 12px;
    color: white;
}

/* Link */
a {
    color: #ffffff !important;
}

/* Button */
.button, input[type=submit], .submit-row input {
    background: #ff6ec4 !important;
    border: none;
    border-radius: 8px;
}

/* Table header */
thead th {
    background: rgba(255,255,255,0.2) !important;
    color: white !important;
}

/* Sidebar (kalau ada) */
#nav-sidebar {
    background: rgba(0,0,0,0.2) !important;
}

/* Text */
body, h1, h2, h3, h4 {
    color: white !important;
}

/* TABLE CONTAINER */
.module table {
    background: rgba(255, 255, 255, 0.1) !important;
    backdrop-filter: blur(8px);
    border-radius: 10px;
    overflow: hidden;
}

/* HEADER TABEL */
.module table thead th {
    background: linear-gradient(90deg, #ff6ec4, #7873f5) !important;
    color: white !important;
    border: none;
}

/* ISI TABEL */
.module table tbody tr {
    background: rgba(255, 255, 255, 0.05) !important;
    color: white;
}

/* HOVER */
.module table tbody tr:hover {
    background: rgba(255, 255, 255, 0.15) !important;
}

/* BORDER */
.module table td, 
.module table th {
    border: none !important;
}

/* LINK DI TABEL */
.module table a {
    color: #ffffff !important;
    font-weight: 500;
}

/* ACTION BUTTON (Add / Change) */
.object-tools a {
    background: linear-gradient(90deg, #ff6ec4, #7873f5);
    color: white !important;
    border-radius: 8px;
    padding: 5px 10px;
}

.module {
    background: rgba(255,255,255,0.1) !important;
    backdrop-filter: blur(10px);
    border-radius: 12px;
}

/* RECENT ACTIONS BOX */
#content-related {
    background: rgba(255,255,255,0.1) !important;
    backdrop-filter: blur(10px);
    border-radius: 12px;
    color: white;
}

/* HEADER RECENT ACTIONS */
#content-related h2 {
    color: white !important;
}

/* ISI LIST */
#content-related .module {
    background: transparent !important;
}

/* TEXT */
#content-related, 
#content-related p, 
#content-related li {
    color: white !important;
}

/* ===== FIX WARNA HITAM YANG MASIH MUNCUL ===== */

/* INPUT & FORM */
input, textarea, select {
    background: rgba(255,255,255,0.9) !important;
    color: #333 !important;
}

/* FIELDSET (form edit) */
fieldset {
    background: rgba(255,255,255,0.1) !important;
    border-radius: 10px;
}

/* FORM ROW */
.form-row {
    border-bottom: none !important;
}

/* FILTER SIDEBAR (yang kanan) */
#changelist-filter {
    background: rgba(255,255,255,0.1) !important;
    backdrop-filter: blur(10px);
    border-radius: 10px;
    color: white;
}

/* FILTER TITLE */
#changelist-filter h2 {
    color: white !important;
}

/* FILTER LINK */
#changelist-filter a {
    color: white !important;
}

/* SEARCH BAR */
#changelist-search input {
    background: rgba(255,255,255,0.9) !important;
    color: #333 !important;
    border-radius: 8px;
}

/* ACTION BAR (yang hitam di atas tabel) */
.actions {
    background: rgba(255,255,255,0.1) !important;
    color: white;
    border-radius: 8px;
}

/* DROPDOWN ACTION */
.actions select {
    background: white !important;
    color: #333 !important;
}

/* PAGINATION */
.paginator {
    color: white !important;
}

/* BREADCRUMB */
.breadcrumbs {
    background: rgba(0,0,0,0.2) !important;
    color: white;
    border-radius: 8px;
}

/* BUTTON DELETE DI FORM */
.submit-row .deletelink {
    background: #ff4d6d !important;
    color: white !important;
    border-radius: 8px;
}

/* SAVE BUTTON AREA */
.submit-row {
    background: transparent !important;
    border: none;
}

/* ===== FIX SISA HITAM (FINAL CLEAN) ===== */

/* SEARCH BAR WRAPPER */
#changelist-search {
    background: rgba(255,255,255,0.15) !important;
    border-radius: 10px;
    padding: 10px;
}

/* INPUT SEARCH */
#changelist-search input {
    background: rgba(255,255,255,0.9) !important;
    color: #333 !important;
}

/* SEARCH BUTTON */
#changelist-search button {
    background: linear-gradient(90deg, #ff6ec4, #7873f5) !important;
    color: white;
    border: none;
    border-radius: 8px;
}

/* ACTION BAR (yang hitam panjang itu) */
.actions {
    background: rgba(255,255,255,0.15) !important;
    border-radius: 10px;
    padding: 10px;
    color: white;
}

/* DROPDOWN ACTION */
.actions select {
    background: white !important;
    color: #333 !important;
    border-radius: 6px;
}

/* RUN BUTTON */
.actions button {
    background: linear-gradient(90deg, #ff6ec4, #7873f5) !important;
    color: white;
    border-radius: 6px;
}

/* FILTER ACTIVE (yang garis hitam kiri) */
#changelist-filter li.selected {
    border-left: 4px solid #ff6ec4 !important;
    background: rgba(255,255,255,0.1);
}

/* HILANGIN BORDER HITAM */
#changelist-filter li {
    border: none !important;
}

/* TABLE CHECKBOX AREA */
.action-checkbox-column {
    background: transparent !important;
}

/* HEADER BAR ATAS TABEL */
#changelist .results {
    background: transparent !important;
}

/* ===== FINAL OVERRIDE HITAM DJANGO ===== */

/* WRAPPER BESAR (yang ngeblok area hitam itu) */
#changelist {
    background: transparent !important;
}

/* CONTAINER FORM LIST */
.changelist-form-container {
    background: transparent !important;
}

/* SEARCH AREA FULL */
#changelist-search,
#changelist-search form {
    background: rgba(255,255,255,0.15) !important;
    border-radius: 12px;
}

/* BAGIAN DALAM SEARCH (yang masih gelap) */
#changelist-search input[type="text"] {
    background: rgba(255,255,255,0.9) !important;
    color: #333 !important;
}

/* WRAPPER RESULTS (inti hitamnya di sini) */
#changelist .results {
    background: transparent !important;
}

/* TABLE WRAPPER DALAM */
#changelist .results table {
    background: rgba(255,255,255,0.1) !important;
    backdrop-filter: blur(10px);
    border-radius: 10px;
}

/* HEADER ACTION (BAR HITAM) */
#changelist .actions {
    background: rgba(255,255,255,0.15) !important;
    border-radius: 10px;
}

/* SELECT BOX */
#changelist select {
    background: white !important;
    color: #333 !important;
}

/* SEARCH ICON AREA */
#changelist-search img {
    filter: brightness(0) invert(1);
}

/* ===== FIX TOTAL WARNA HITAM ===== */

/* ADD REPORT BUTTON */
.object-tools a {
    background: linear-gradient(90deg, #ff6ec4, #7873f5) !important;
    color: white !important;
    border-radius: 10px;
    border: none;
}

/* WRAPPER SEARCH (yang abu/hitam itu) */
#toolbar {
    background: rgba(255,255,255,0.15) !important;
    border-radius: 12px;
    padding: 10px;
}

/* DALAM SEARCH BAR */
#toolbar form {
    background: transparent !important;
}

/* INPUT SEARCH */
#toolbar input {
    background: rgba(255,255,255,0.9) !important;
    color: #333 !important;
    border-radius: 8px;
}

/* BUTTON SEARCH */
#toolbar button,
#toolbar input[type=submit] {
    background: linear-gradient(90deg, #ff6ec4, #7873f5) !important;
    color: white !important;
    border-radius: 8px;
}

/* CONTAINER BESAR (yang masih gelap di belakang search) */
#changelist .changelist-form-container {
    background: transparent !important;
}

/* WRAPPER LUAR TABLE */
#changelist .results {
    background: rgba(255,255,255,0.1) !important;
    backdrop-filter: blur(10px);
    border-radius: 12px;
    padding: 10px;
}

/* HEADER SEARCH ICON AREA */
#toolbar img {
    filter: brightness(0) invert(1);
}
</style>
{% endblock %}
